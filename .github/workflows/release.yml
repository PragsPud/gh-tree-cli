name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Prevents one OS failure from cancelling the others
      matrix:
        include:
          - os: ubuntu-latest
            executable: gh_tree
          - os: macos-latest
            executable: gh_tree
          - os: windows-latest
            executable: gh_tree.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install curl nlohmann-json

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev

      - name: Setup MSYS2 & Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-curl

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          ninja

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/${{ matrix.executable }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
